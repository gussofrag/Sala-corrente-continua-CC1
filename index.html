<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Mappa pali sala corrente continua CC1</title>

  <style>
    .map-container {
      position: relative;
      width: 100%;
      max-width: 100%;
      height: auto;
    }

    .map-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .marker {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      border: 2px solid #fff;
      user-select: none;
    }

    .azzurro { background: #0099ff; }
    .verde   { background: #00cc44; }

    .selected {
      width: 28px !important;
      height: 28px !important;
      border: 3px solid yellow !important;
      z-index: 20;
    }

    /* Tooltip doppio */
    .tooltip {
      position: absolute;
      padding: 10px 14px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 15px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-weight: 500;
      border-radius: 6px;
      white-space: nowrap;
      transform: translate(-50%, -120%);
      pointer-events: auto;
      display: none;
      z-index: 30;
    }

    .tooltip a {
      color: #66ccff;
      text-decoration: none;
      font-weight: 600;
      display: block;
      margin: 3px 0;
    }

    .tooltip a:hover {
      text-decoration: underline;
    }

    /* Pulsante casetta */
    .home-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.75);
      padding: 10px;
      border-radius: 50%;
      box-shadow: 0 3px 8px rgba(0,0,0,0.4);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .home-btn:hover {
      background: rgba(0,0,0,0.9);
      transform: scale(1.08);
    }
  </style>
</head>

  <!-- 🔵 PULSANTE CASETTA -->

    const map = document.getElementById("map");
    const tooltip = document.getElementById("tooltip");

    let selectedMarker = null;

    // Tooltip persistente
    tooltip.addEventListener("mouseenter", () => {
      tooltip.style.display = "block";
    });

    tooltip.addEventListener("mouseleave", () => {
      tooltip.style.display = "none";
    });

    markers.forEach(m => {
      const el = document.createElement("div");

      el.className = "marker " + (m.n <= 324 ? "azzurro" : "verde");
      el.style.left = (m.x * 100) + "%";
      el.style.top = (m.y * 100) + "%";

      // Tooltip doppio + percorso corretto QLT
      el.addEventListener("mouseenter", () => {
        tooltip.innerHTML = `
          <div><strong>Palo ${m.n}</strong></div>
          <a href="pdf/P_${m.n}.pdf" target="_blank">📄 Elaborato Progettuale</a>
          <a href="Qualità/P_${m.n}_QLT.pdf" target="_blank">🟠 Documento Qualità (QLT)</a>
        `;
        tooltip.style.left = (m.x * 100) + "%";
        tooltip.style.top = (m.y * 100) + "%";
        tooltip.style.display = "block";
      });

      // Ritardo intelligente
      el.addEventListener("mouseleave", () => {
        setTimeout(() => {
          if (!tooltip.matches(':hover')) {
            tooltip.style.display = "none";
          }
        }, 120);
      });

      // Click = apre PDF principale + evidenziazione
      el.addEventListener("click", () => {
        if (selectedMarker) selectedMarker.classList.remove("selected");
        el.classList.add("selected");
        selectedMarker = el;
        window.open(`pdf/P_${m.n}.pdf`, "_blank");
      });

      map.appendChild(el);
    });
